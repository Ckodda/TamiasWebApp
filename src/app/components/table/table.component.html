<ion-card class="ion-no-margin table-container">
  <div class="table-responsive">
    <table class="data-table">
      <thead>
        <tr>
          <th *ngFor="let col of columns" [class]="col.cssClass">
            <ion-text color="dark"><b>{{ col.label }}</b></ion-text>
          </th>
        </tr>
      </thead>

      <tbody *ngIf="!isLoading && items.length > 0">
        <tr *ngFor="let item of items">
          <td *ngFor="let col of columns" [class]="col.cssClass">
            <ng-container [ngSwitch]="col.type">
              <!-- Caso Badge -->
              <div *ngSwitchCase="'badge'">
                <ion-badge [color]="item[col.key] ? 'success' : 'medium'">
                  {{ item[col.key] ? 'Activo' : 'Inactivo' }}
                </ion-badge>
              </div>

              <!-- Caso Acciones -->
              <div *ngSwitchCase="'actions'" class="ion-text-nowrap ion-flex ion-justify-content-end">
                <ion-button fill="clear" color="primary" size="small" (click)="$event.stopPropagation(); edit.emit(item)">
                  <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
                </ion-button>
                <ion-button fill="clear" color="danger" size="small" (click)="$event.stopPropagation(); delete.emit(item)">
                  <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                </ion-button>
              </div>

              <!-- Texto por Defecto -->
              <ion-text *ngSwitchDefault>
                {{ item[col.key] }}
              </ion-text>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Template de Carga -->
  <div *ngIf="isLoading" class="ion-text-center ion-padding">
    <ion-spinner name="crescent"></ion-spinner>
    <p><ion-text color="medium"><small>Cargando datos...</small></ion-text></p>
  </div>

  <!-- Mensaje de Lista Vacía -->
  <div *ngIf="items.length === 0 && !isLoading" class="ion-text-center ion-padding">
    <ion-text color="medium">No se encontraron registros.</ion-text>
  </div>

  <!-- Paginación Estándar -->
  <div class="ion-padding ion-flex ion-justify-content-between ion-align-items-center ion-flex-wrap" *ngIf="totalCount > 0 && !isLoading" style="gap: 16px;">
    <div class="ion-flex ion-align-items-center">
      <ion-text color="medium" class="ion-margin-end">
        <small>Total: {{ totalCount }} {{ totalLabel }}</small>
      </ion-text>
      <ion-text color="medium" class="ion-hide-sm-down ion-margin-end">
        <small>|</small>
      </ion-text>
      <ion-text color="medium"><small>Mostrar:</small></ion-text>
      <ion-select mode="md" interface="popover" [(ngModel)]="pageSize" (ionChange)="onSizeChange()" style="min-height: auto; --padding-start: 8px; width: 70px;">
        <ion-select-option [value]="5">5</ion-select-option>
        <ion-select-option [value]="10">10</ion-select-option>
        <ion-select-option [value]="20">20</ion-select-option>
        <ion-select-option [value]="50">50</ion-select-option>
      </ion-select>
    </div>

    <div class="ion-flex ion-align-items-center">
      <ion-button fill="clear" size="small" [disabled]="pageNumber === 1" (click)="onPrevPage()">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
      <ion-text color="dark" class="ion-margin-horizontal">
        <small>Página {{ pageNumber }} de {{ totalPages }}</small>
      </ion-text>
      <ion-button fill="clear" size="small" [disabled]="pageNumber === totalPages" (click)="onNextPage()">
        <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
      </ion-button>
    </div>
  </div>
</ion-card>
