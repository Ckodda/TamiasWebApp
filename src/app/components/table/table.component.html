<ion-card class="ion-no-margin list-container">
  <ion-grid class="ion-no-padding">
    <!-- Cabecera: Escritorio -->
    <ion-row class="header-row ion-hide-md-down">
      <ion-col *ngFor="let col of columns" [sizeMd]="col.sizeMd" [class]="col.cssClass">
        <b>{{ col.label }}</b>
      </ion-col>
    </ion-row>

    <!-- Cuerpo de Datos -->
    <ng-container *ngIf="!isLoading; else loadingTemplate">
      <ion-row *ngFor="let item of items" class="data-row ion-align-items-center">
        <ion-col *ngFor="let col of columns" [size]="col.size" [sizeMd]="col.sizeMd" [class]="col.cssClass">
          
          <!-- Etiquetas informativas para Móvil -->
          <ion-text color="medium" class="ion-hide-md-up" *ngIf="col.type !== 'actions'">
            <small>{{ col.label }}: </small>
          </ion-text>

          <!-- Renderizado dinámico según el tipo -->
          <ng-container [ngSwitch]="col.type">
            
            <!-- Caso Badge: Estados Activo/Inactivo -->
            <ion-badge *ngSwitchCase="'badge'" [color]="item[col.key] ? 'success' : 'medium'">
              {{ item[col.key] ? 'Activo' : 'Inactivo' }}
            </ion-badge>

            <!-- Caso Acciones -->
            <ng-container *ngSwitchCase="'actions'">
              <ion-button fill="clear" color="primary" size="small" (click)="edit.emit(item)">
                <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
              </ion-button>
              <ion-button fill="clear" color="danger" size="small" (click)="delete.emit(item)">
                <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
              </ion-button>
            </ng-container>

            <!-- Texto por Defecto -->
            <ion-text *ngSwitchDefault class="ion-text-wrap">
              {{ item[col.key] }}
            </ion-text>
          </ng-container>

        </ion-col>
      </ion-row>
    </ng-container>

    <!-- Template de Carga -->
    <ng-template #loadingTemplate>
      <div class="ion-text-center ion-padding">
        <ion-spinner name="crescent"></ion-spinner>
        <p><ion-text color="medium"><small>Cargando datos...</small></ion-text></p>
      </div>
    </ng-template>
  </ion-grid>

  <!-- Paginación Estándar -->
  <div class="ion-padding-horizontal ion-padding-bottom ion-margin-top pagination-container" *ngIf="totalCount > 0 && !isLoading">
    <div class="pagination-info">
      <ion-text color="medium">
        <small>Total: {{ totalCount }} {{ totalLabel }}</small>
      </ion-text>
      <ion-text color="medium" class="ion-margin-start ion-margin-end">
        <small>|</small>
      </ion-text>
      <ion-text color="medium"><small>Mostrar:</small></ion-text>
      <ion-select mode="md" interface="popover" [(ngModel)]="pageSize" (ionChange)="onSizeChange()" class="page-size-select">
        <ion-select-option [value]="5">5</ion-select-option>
        <ion-select-option [value]="10">10</ion-select-option>
        <ion-select-option [value]="20">20</ion-select-option>
        <ion-select-option [value]="50">50</ion-select-option>
      </ion-select>
    </div>

    <div class="pagination-controls">
      <ion-button fill="clear" size="small" [disabled]="pageNumber === 1" (click)="onPrevPage()">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
      <ion-text color="dark" class="ion-margin-horizontal">
        <small>Página {{ pageNumber }} de {{ totalPages }}</small>
      </ion-text>
      <ion-button fill="clear" size="small" [disabled]="pageNumber === totalPages" (click)="onNextPage()">
        <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
      </ion-button>
    </div>
  </div>

  <!-- Mensaje de Lista Vacía -->
  <div *ngIf="items.length === 0 && !isLoading" class="ion-text-center ion-padding">
    <ion-text color="medium">No se encontraron registros.</ion-text>
  </div>
</ion-card>
