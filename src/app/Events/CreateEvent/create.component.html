<ion-header mode="ios">
  <ion-toolbar>
    <ion-title>Crear Evento</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/events"></ion-back-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancelar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form *ngIf="form" [formGroup]="form" (ngSubmit)="createEvent()">
    <ion-input
      mode="md"
      fill="outline"
      label="Nombre del Evento"
      labelPlacement="stacked"
      formControlName="EventName"
      placeholder="Ej: Lanzamiento de producto"
      [errorText]="getErrorMessage('EventName')"
      class="ion-margin-bottom"
      required
    ></ion-input>

    <ion-select
      mode="md"
      fill="outline"
      label="Centro de Costo *"
      labelPlacement="stacked"
      formControlName="CostCenterId"
      placeholder="Seleccione..."
      [errorText]="getErrorMessage('CostCenterId')"
      required
      interface="popover"
      class="ion-margin-bottom"
    >
      <ion-select-option [value]="null">Seleccione...</ion-select-option>
      <ion-select-option *ngIf="selectedCostCenter() as sel" [value]="sel.Id">
        {{ costCenterLabelFn(sel) }}
      </ion-select-option>
      <ng-container *ngFor="let item of costCenters()">
        <ion-select-option *ngIf="item.Id !== selectedCostCenter()?.Id" [value]="item.Id">
          {{ costCenterLabelFn(item) }}
        </ion-select-option>
      </ng-container>
      <app-searchable-select
        slot="end"
        placeholder="Buscar Centro de Costo..."
        [items]="costCenters()"
        [loading]="isSearchingCostCenters()"
        [itemLabelFn]="costCenterLabelFn"
        [itemNoteFn]="costCenterNoteFn"
        (searchChange)="onCostCenterSearchChange($event)"
        (itemSelected)="onCostCenterSelected($event)"
      ></app-searchable-select>
    </ion-select>

    <ion-select
      mode="md"
      fill="outline"
      label="Moneda *"
      labelPlacement="stacked"
      formControlName="CurrencyId"
      placeholder="Seleccione..."
      [errorText]="getErrorMessage('CurrencyId')"
      required
      interface="popover"
      class="ion-margin-bottom"
    >
      <ion-select-option [value]="null">Seleccione...</ion-select-option>
      <ion-select-option *ngIf="selectedCurrency() as sel" [value]="sel.Id">
        {{ currencyLabelFn(sel) }}
      </ion-select-option>
      <ng-container *ngFor="let item of currencies()">
        <ion-select-option *ngIf="item.Id !== selectedCurrency()?.Id" [value]="item.Id">
          {{ currencyLabelFn(item) }}
        </ion-select-option>
      </ng-container>
      <app-searchable-select
        slot="end"
        placeholder="Buscar Moneda..."
        [items]="currencies()"
        [loading]="isSearchingCurrencies()"
        [itemLabelFn]="currencyLabelFn"
        [itemNoteFn]="currencyNoteFn"
        (searchChange)="onCurrencySearchChange($event)"
        (itemSelected)="onCurrencySelected($event)"
      ></app-searchable-select>
    </ion-select>

    <ion-input
      mode="md"
      fill="outline"
      label="Monto Objetivo"
      labelPlacement="stacked"
      type="number"
      formControlName="TargetAmount"
      placeholder="0.00"
      [errorText]="getErrorMessage('TargetAmount')"
      class="ion-margin-bottom"
      required
    ></ion-input>

    <ion-select
      mode="md"
      fill="outline"
      label="Estado del Evento"
      labelPlacement="stacked"
      formControlName="EventStatus"
      placeholder="Seleccione un estado"
      interface="popover"
      [errorText]="getErrorMessage('EventStatus')"
      class="ion-margin-bottom"
      required
    >
      <ion-select-option [value]="null">Seleccione...</ion-select-option>
      <ion-select-option value="Active">Activo</ion-select-option>
      <ion-select-option value="Completed">Completado</ion-select-option>
      <ion-select-option value="Cancelled">Cancelado</ion-select-option>
    </ion-select>

    <ion-input
      mode="md"
      fill="outline"
      label="Fecha de Inicio"
      labelPlacement="stacked"
      type="date"
      formControlName="StartDate"
      [errorText]="getErrorMessage('StartDate')"
      class="ion-margin-bottom"
      required
    ></ion-input>

    <ion-text color="danger" *ngIf="validationErrors()?.general">
      <small>{{ validationErrors().general[0] }}</small>
    </ion-text>

    <div class="ion-padding-top">
      <ion-button expand="block" type="submit" [disabled]="isLoading()">
        <ion-spinner slot="start" name="crescent" size="small" *ngIf="isLoading()"></ion-spinner>
        {{ isLoading() ? 'Creando...' : 'Crear Evento' }}
      </ion-button>
    </div>
  </form>
</ion-content>
