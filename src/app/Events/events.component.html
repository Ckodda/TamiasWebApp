<ion-content class="ion-padding">
  <div class="header-container ion-margin-bottom ion-flex ion-justify-content-between ion-align-items-center">
    <ion-text color="dark">
      <h1 class="bold-title ion-no-margin">Eventos</h1>
    </ion-text>
    <ion-button color="success" (click)="openCreateModal()">
      <ion-icon slot="start" name="add-outline"></ion-icon>
      Nuevo Evento
    </ion-button>
  </div>

  <!-- Sección de Filtros -->
  <ion-card class="ion-no-margin ion-margin-bottom allow-overflow">
    <ion-card-header>
      <ion-card-title class="filter-card-title ion-flex ion-align-items-center">
        <ion-icon name="filter-outline" slot="start" class="ion-margin-end"></ion-icon>
        Filtros de búsqueda
      </ion-card-title>
    </ion-card-header>
    <ion-card-content class="allow-overflow">
      <ion-grid>
        <ion-row>
          <ion-col size="12" size-md="1">
            <ion-input
              mode="md"
              fill="outline"
              label="ID"
              labelPlacement="stacked"
              type="number"
              [(ngModel)]="filters.Id"
              placeholder="Ej: 1"
              [errorText]="validationErrors()?.Id ? validationErrors().Id[0] : ''"
              [class.ion-invalid]="validationErrors()?.Id"
              [class.ion-touched]="validationErrors()?.Id"
            ></ion-input>
          </ion-col>

          <ion-col size="12" size-md="3">
            <ion-input
              mode="md"
              fill="outline"
              label="Nombre del Evento"
              labelPlacement="stacked"
              [(ngModel)]="filters.EventName"
              placeholder="Ej: Concierto, Conferencia..."
              [errorText]="validationErrors()?.EventName ? validationErrors().EventName[0] : ''"
              [class.ion-invalid]="validationErrors()?.EventName"
              [class.ion-touched]="validationErrors()?.EventName"
            ></ion-input>
          </ion-col>

          <ion-col size="12" size-md="2" class="ion-position-relative">
            <!-- Chip de moneda seleccionada -->
            <ion-chip *ngIf="selectedCurrency()" 
                      (click)="clearCurrencySelection()" 
                      class="ion-no-margin ion-justify-content-between ion-align-items-center"
                      style="width: 100%; height: 56px;">
              <ion-label class="ion-text-wrap">
                <div class="ion-text-uppercase" style="font-weight: bold; font-size: 0.9rem;">
                  {{ selectedCurrency()?.CurrencyCode }}
                </div>
                <ion-note style="font-size: 0.75rem;">{{ selectedCurrency()?.CurrencyName }}</ion-note>
              </ion-label>
              <ion-icon name="close-circle"></ion-icon>
            </ion-chip>

            <!-- Input de búsqueda (solo se muestra si no hay selección) -->
            <ion-input
              *ngIf="!selectedCurrency()"
              id="currency-search-input"
              mode="md"
              fill="outline"
              label="Moneda (Mín. 3 car.)"
              labelPlacement="stacked"
              [value]="currencySearchTerm()"
              (ionInput)="onCurrencyInput($event)"
              placeholder="Ej: USD, PEN..."
            ></ion-input>

            <!-- Usamos ion-popover para que flote sobre la tabla sin ser tapado -->
            <ion-popover 
              trigger="currency-search-input" 
              triggerAction="context-menu"
              [isOpen]="showCurrencyDropdown()"
              (didDismiss)="showCurrencyDropdown.set(false)"
              side="bottom"
              alignment="start"
              [dismissOnSelect]="true"
              class="currency-popover">
              <ng-template>
                <ion-content>
                  <ion-list class="ion-no-padding">
                    <ion-item *ngIf="isSearchingCurrencies()" lines="none" class="ion-text-center">
                      <ion-spinner name="crescent" class="ion-margin-auto"></ion-spinner>
                    </ion-item>
                    <ng-container *ngIf="!isSearchingCurrencies()">
                      <ion-item button *ngFor="let curr of currencies()" (click)="selectCurrency(curr)">
                        <ion-label>
                          <h2>{{ curr.CurrencyCode }}</h2>
                          <p>{{ curr.CurrencyName }}</p>
                        </ion-label>
                      </ion-item>
                      <ion-item *ngIf="currencies().length === 0" lines="none">
                        <ion-label color="medium">No hay resultados</ion-label>
                      </ion-item>
                    </ng-container>
                  </ion-list>
                </ion-content>
              </ng-template>
            </ion-popover>
          </ion-col>

          <ion-col size="12" size-md="2">
            <ion-input
              mode="md"
              fill="outline"
              label="Fecha de Inicio"
              labelPlacement="stacked"
              type="date"
              [(ngModel)]="filters.StartDate"
              [errorText]="validationErrors()?.StartDate ? validationErrors().StartDate[0] : ''"
              [class.ion-invalid]="validationErrors()?.StartDate"
              [class.ion-touched]="validationErrors()?.StartDate"
            ></ion-input>
          </ion-col>
          <ion-col size="12" size-md="2">
            <ion-select
              mode="md"
              fill="outline"
              label="Estado"
              labelPlacement="stacked"
              [(ngModel)]="filters.IsActive"
              interface="popover"
              [errorText]="validationErrors()?.IsActive ? validationErrors().IsActive[0] : ''"
              [class.ion-invalid]="validationErrors()?.IsActive"
              [class.ion-touched]="validationErrors()?.IsActive"
            >
              <ion-select-option [value]="null">Todos</ion-select-option>
              <ion-select-option [value]="true">Activo</ion-select-option>
              <ion-select-option [value]="false">Inactivo</ion-select-option>
            </ion-select>
          </ion-col>

          <ion-col size="12" size-md="2" class="ion-align-self-center">
              <ion-button expand="block" (click)="LoadData()" [disabled]="isLoading()">
                <ion-icon slot="start" name="search-outline" *ngIf="!isLoading()"></ion-icon>
                <ion-spinner slot="start" name="crescent" size="small" *ngIf="isLoading()"></ion-spinner>
                {{ isLoading() ? 'Buscando...' : 'Buscar' }}
              </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

  <!-- Reutilización del componente de tabla genérico -->
     <app-table
     [items]="events()"
     [columns]="eventColumns"
     [isLoading]="isLoading()"
     [totalCount]="totalCount()"
     [pageNumber]="filters.PageNumber!"
     [pageSize]="filters.PageSize!"
     [totalLabel]="'eventos'"
     (edit)="onTableEdit($event)"
     (delete)="onTableDelete($event)"
     (pageChange)="onTablePageChange($event)"
     (pageSizeChange)="onTablePageSizeChange($event)"
     ></app-table>
</ion-content>
