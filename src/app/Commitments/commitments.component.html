<ion-content class="ion-padding">
  <div class="ion-margin-bottom ion-flex ion-justify-content-between ion-align-items-center ion-flex-wrap" style="gap: 10px;">
    <ion-text color="dark">
      <h1 class="ion-no-margin" style="font-weight: bold;">Compromisos</h1>
    </ion-text>
    <ion-button color="success" (click)="navigateToCreate()">
      <ion-icon slot="start" name="add-outline"></ion-icon>
      Nuevo Compromiso
    </ion-button>
  </div>

  <!-- Sección de Filtros -->
  <ion-card class="ion-no-margin ion-margin-bottom" style="overflow: visible;">
    <ion-card-header>
      <ion-card-title class="ion-flex ion-align-items-center" style="font-size: 1.1rem; font-weight: 600;">
        <ion-icon name="filter-outline" slot="start" class="ion-margin-end"></ion-icon>
        Filtros de búsqueda
      </ion-card-title>
    </ion-card-header>
    <ion-card-content style="overflow: visible;">
      <ion-grid>
        <ion-row>
          <ion-col size="12" size-md="1">
            <ion-input
              mode="md"
              fill="outline"
              label="ID"
              labelPlacement="stacked"
              type="number"
              [(ngModel)]="filters.Id"
              placeholder="Ej: 1"
              [errorText]="validationErrors()?.Id ? validationErrors().Id[0] : ''"
              [class.ion-invalid]="validationErrors()?.Id"
              [class.ion-touched]="validationErrors()?.Id"
            ></ion-input>
          </ion-col>

          <ion-col size="12" size-md="2">
            <ion-select
              mode="md"
              fill="outline"
              label="Centro de Costo"
              labelPlacement="stacked"
              [(ngModel)]="filters.CostCenterId"
              placeholder="Seleccione..."
              interface="popover"
              [errorText]="validationErrors()?.CostCenterId ? validationErrors().CostCenterId[0] : ''"
              [class.ion-invalid]="validationErrors()?.CostCenterId"
              [class.ion-touched]="validationErrors()?.CostCenterId"
            >
              <ion-select-option [value]="null">Todos</ion-select-option>
              <ion-select-option *ngIf="selectedCostCenter() as sel" [value]="sel.Id">
                {{ costCenterLabelFn(sel) }}
              </ion-select-option>
              <app-searchable-select
                slot="end"
                placeholder="Buscar Centro de Costo..."
                [items]="costCenters()"
                [loading]="isSearchingCostCenters()"
                [itemLabelFn]="costCenterLabelFn"
                [itemNoteFn]="costCenterNoteFn"
                (searchChange)="onCostCenterSearchChange($event)"
                (itemSelected)="onCostCenterSelected($event)"
              ></app-searchable-select>
            </ion-select>
          </ion-col>
          
          <ion-col size="12" size-md="2">
            <ion-select
              mode="md"
              fill="outline"
              label="Moneda"
              labelPlacement="stacked"
              [(ngModel)]="filters.CurrencyId"
              placeholder="Seleccione..."
              interface="popover"
              [errorText]="validationErrors()?.CurrencyId ? validationErrors().CurrencyId[0] : ''"
              [class.ion-invalid]="validationErrors()?.CurrencyId"
              [class.ion-touched]="validationErrors()?.CurrencyId"
            >
              <ion-select-option [value]="null">Todos</ion-select-option>
              <ion-select-option *ngIf="selectedCurrency() as sel" [value]="sel.Id">
                {{ currencyLabelFn(sel) }}
              </ion-select-option>
              <app-searchable-select
                slot="end"
                placeholder="Buscar Moneda..."
                [items]="currencies()"
                [loading]="isSearchingCurrencies()"
                [itemLabelFn]="currencyLabelFn"
                [itemNoteFn]="currencyNoteFn"
                (searchChange)="onCurrencySearchChange($event)"
                (itemSelected)="onCurrencySelected($event)"
              ></app-searchable-select>
            </ion-select>
          </ion-col>

          <ion-col size="12" size-md="2">
            <ion-select
              mode="md"
              fill="outline"
              label="Evento"
              labelPlacement="stacked"
              [(ngModel)]="filters.EventId"
              placeholder="Seleccione..."
              interface="popover"
              [errorText]="validationErrors()?.EventId ? validationErrors().EventId[0] : ''"
              [class.ion-invalid]="validationErrors()?.EventId"
              [class.ion-touched]="validationErrors()?.EventId"
            >
              <ion-select-option [value]="null">Todos</ion-select-option>
              <ion-select-option *ngIf="selectedEvent() as sel" [value]="sel.Id">
                {{ eventLabelFn(sel) }}
              </ion-select-option>
              <app-searchable-select
                slot="end"
                placeholder="Buscar Evento..."
                [items]="events()"
                [loading]="isSearchingEvents()"
                [itemLabelFn]="eventLabelFn"
                [itemNoteFn]="eventNoteFn"
                (searchChange)="onEventSearchChange($event)"
                (itemSelected)="onEventSelected($event)"
              ></app-searchable-select>
            </ion-select>
          </ion-col>

          <ion-col size="12" size-md="2">
            <ion-select
              mode="md"
              fill="outline"
              label="Estado del Compromiso"
              labelPlacement="stacked"
              [(ngModel)]="filters.CurrentStatus"
              interface="popover"
              [errorText]="validationErrors()?.CurrentStatus ? validationErrors().CurrentStatus[0] : ''"
              [class.ion-invalid]="validationErrors()?.CurrentStatus"
              [class.ion-touched]="validationErrors()?.CurrentStatus"
            >
              <ion-select-option [value]="null">Todos</ion-select-option>
              <ion-select-option value="Active">Activo</ion-select-option>
              <ion-select-option value="Fulfilled">Cumplido</ion-select-option>
              <ion-select-option value="Cancelled">Cancelado</ion-select-option>
            </ion-select>
          </ion-col>

          <ion-col size="12" size-md="2" class="ion-align-self-center">
              <ion-button expand="block" (click)="LoadData()" [disabled]="isLoading()">
                <ion-icon slot="start" name="search-outline" *ngIf="!isLoading()"></ion-icon>
                <ion-spinner slot="start" name="crescent" size="small" *ngIf="isLoading()"></ion-spinner>
                {{ isLoading() ? 'Buscando...' : 'Buscar' }}
              </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

  <!-- Reutilización del componente de tabla genérico -->
     <app-table
     [items]="commitments()"
     [columns]="commitmentsColumns"
     [isLoading]="isLoading()"
     [totalCount]="totalCount()"
     [pageNumber]="filters.PageNumber!"
     [pageSize]="filters.PageSize!"
     [totalLabel]="'compromisos'"
     (edit)="onTableEdit($event)"
     (delete)="onTableDelete($event)"
     (pageChange)="onTablePageChange($event)"
     (pageSizeChange)="onTablePageSizeChange($event)"
     ></app-table>
</ion-content>
