<ion-content class="ion-padding">
  <div class="header-container ion-margin-bottom" style="display: flex; justify-content: space-between; align-items: center;">
    <ion-text color="dark">
      <h1 style="font-weight: 800; margin: 0;">Monedas</h1>
    </ion-text>
    <ion-button color="success" (click)="openCreateModal()">
      <ion-icon slot="start" name="add-outline"></ion-icon>
      Nueva Moneda
    </ion-button>
  </div>

  <!-- Sección de Filtros -->
  <ion-card class="ion-no-margin ion-margin-bottom">
    <ion-card-header>
      <ion-card-title style="font-size: 1rem; display: flex; align-items: center;">
        <ion-icon name="filter-outline" slot="start" class="ion-margin-end"></ion-icon>
        Filtros de búsqueda
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col size="12" size-md="2">
            <ion-input
              mode="md"
              fill="outline"
              label="ID"
              labelPlacement="stacked"
              type="number"
              [(ngModel)]="filters.Id"
              placeholder="Ej: 1"
              [errorText]="validationErrors()?.Id ? validationErrors().Id[0] : ''"
              [class.ion-invalid]="validationErrors()?.Id"
              [class.ion-touched]="validationErrors()?.Id"
            ></ion-input>
          </ion-col>
          <ion-col size="12" size-md="3">
            <ion-input
              mode="md"
              fill="outline"
              label="Nombre"
              labelPlacement="stacked"
              [(ngModel)]="filters.CurrencyName"
              placeholder="Ej: Dólar"
              [errorText]="validationErrors()?.CurrencyName ? validationErrors().CurrencyName[0] : ''"
              [class.ion-invalid]="validationErrors()?.CurrencyName"
              [class.ion-touched]="validationErrors()?.CurrencyName"
            ></ion-input>
          </ion-col>
          <ion-col size="12" size-md="3">
            <ion-input
              mode="md"
              fill="outline"
              label="Código"
              labelPlacement="stacked"
              [(ngModel)]="filters.CurrencyCode"
              placeholder="Ej: USD"
              [errorText]="validationErrors()?.CurrencyCode ? validationErrors().CurrencyCode[0] : ''"
              [class.ion-invalid]="validationErrors()?.CurrencyCode"
              [class.ion-touched]="validationErrors()?.CurrencyCode"
            ></ion-input>
          </ion-col>
          <ion-col size="12" size-md="2">
            <ion-select
              mode="md"
              fill="outline"
              label="Estado"
              labelPlacement="stacked"
              [(ngModel)]="filters.IsActive"
              interface="popover"
              [errorText]="validationErrors()?.IsActive ? validationErrors().IsActive[0] : ''"
              [class.ion-invalid]="validationErrors()?.IsActive"
              [class.ion-touched]="validationErrors()?.IsActive"
            >
              <ion-select-option [value]="null">Todos</ion-select-option>
              <ion-select-option [value]="true">Activo</ion-select-option>
              <ion-select-option [value]="false">Inactivo</ion-select-option>
            </ion-select>
          </ion-col>
          <ion-col size="12" size-md="2" class="ion-align-self-center">
              <ion-button expand="block" (click)="LoadData()" [disabled]="isLoading()">
                <ion-icon slot="start" name="search-outline" *ngIf="!isLoading()"></ion-icon>
                <ion-spinner slot="start" name="crescent" size="small" *ngIf="isLoading()"></ion-spinner>
                {{ isLoading() ? 'Buscando...' : 'Buscar' }}
              </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

  <!-- Reutilización del componente de tabla genérico -->
  <app-table
    [items]="currencies()"
    [columns]="currencyColumns"
    [isLoading]="isLoading()"
    [totalCount]="totalCount()"
    [pageNumber]="filters.PageNumber!"
    [pageSize]="filters.PageSize!"
    totalLabel="monedas"
    (edit)="onTableEdit($event)"
    (delete)="onTableDelete($event)"
    (pageChange)="onTablePageChange($event)"
    (pageSizeChange)="onTablePageSizeChange($event)"
  ></app-table>
</ion-content>
